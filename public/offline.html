<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#3b82f6" />
  <title>Offline — Park</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      background-color: #fafbff;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      text-align: center;
      max-width: 360px;
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      color: #64748b;
    }

    .icon svg {
      width: 100%;
      height: 100%;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      line-height: 1.5;
      color: #64748b;
      margin-bottom: 32px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 32px;
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      background-color: #3b82f6;
      border: none;
      border-radius: 9999px;
      cursor: pointer;
      transition: background-color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover {
      background-color: #2563eb;
    }

    button:active {
      background-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 16.5v1.125m0 0v1.125m0-1.125h1.125m-1.125 0H10.875" />
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M2.25 12c0-4.97 4.03-9 9-9a9.003 9.003 0 0 1 7.5 4.016M21.75 12c0 4.97-4.03 9-9 9a9.003 9.003 0 0 1-7.5-4.016" />
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 6.75a5.25 5.25 0 0 1 4.778 3.072M12 6.75a5.25 5.25 0 0 0-4.778 3.072" />
        <line x1="3" y1="3" x2="21" y2="21" stroke-linecap="round" stroke-width="1.5" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Park needs a connection to check parking rules. Your saved data and timer will still work.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
